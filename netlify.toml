[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[dev]
  command = "npm run dev"
  targetPort = 3000
  port = 8888
  framework = "#auto"

[[redirects]]
  from = "/services/installation"
  to = "/hardwood-floor-installation-kansas-city"
  status = 301

[[redirects]]
  from = "/services/refinish-recoat-and-repair"
  to = "/hardwood-floor-refinishing-kansas-city"
  status = 301

[[redirects]]
  from = "/services/refinish-recoat-repair"
  to = "/hardwood-floor-refinishing-kansas-city"
  status = 301

[[redirects]]
  from = "/services/refinish-and-repair"
  to = "/hardwood-floor-refinishing-kansas-city"
  status = 301

[[redirects]]
  from = "/services/stairs-and-railings"
  to = "/hardwood-stairs-railings-kansas-city"
  status = 301

[[redirects]]
  from = "/services/custom-floor-patterns"
  to = "/custom-hardwood-floors-kansas-city"
  status = 301

[[redirects]]
  from = "/services/custom-flooring"
  to = "/custom-hardwood-floors-kansas-city"
  status = 301

[[redirects]]
  from = "/projects/stage-and-steps-installation-in-lenexa-ks"
  to = "/projects/stage-steps-installation-in-lenexa-ks"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
